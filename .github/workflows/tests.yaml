name: RISC-V practice exercises CI/CD workflow

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: RISC-V exercises tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install necessary dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake autotools-dev curl python3 python3-pip \
          python3-tomli libmpc-dev libmpfr-dev libgmp-dev gawk build-essential bison flex \
          texinfo gperf libtool patchutils bc zlib1g-dev libexpat-dev ninja-build git \
          cmake libglib2.0-dev libslirp-dev libncurses-dev gcc-riscv64-linux-gnu \
          qemu-system qemu-user-binfmt

      - name: 🧪 Run RISC-V tests for all practice exercises
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for d in */; do
            folder_name=${d%/}

            pushd "$d" >/dev/null

            riscv64-linux-gnu-gcc -march=rv64gc -mabi=lp64d test.c \
              "${folder_name}.s" \
              -o "${folder_name}"

            qemu-riscv64 -L /usr/riscv64-linux-gnu "./${folder_name}"

            popd >/dev/null
                echo "✅ $folder_name test passed"

          done
          echo "✅ All tests passed!"
